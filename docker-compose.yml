services:

  # ─── API Express ──────────────────────────────────────────────────────────────
  myhonda-sfs-api:
    image: ghcr.io/felipetmacedo/dashboard-myhonda:api-latest
    environment:
      NODE_ENV: production
      PORT: "3000"
      TZ: America/Recife
      SFSEA_DB_NAME: ${SFSEA_DB_NAME}
      SFSEA_DB_USER: ${SFSEA_DB_USER}
      SFSEA_DB_PASSWORD: ${SFSEA_DB_PASSWORD}
      SFSEA_DB_HOST: ${SFSEA_DB_HOST}
      SFSEA_DB_PORT: ${SFSEA_DB_PORT:-3306}
    networks:
      - sagzap
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=sagzap"
        - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
        - "traefik.http.routers.myhonda-api.entrypoints=websecure"
        - "traefik.http.routers.myhonda-api.middlewares=sslheader"
        - "traefik.http.routers.myhonda-api.priority=1"
        - "traefik.http.routers.myhonda-api.rule=Host(`express-myhonda.sagzap.com.br`)"
        - "traefik.http.routers.myhonda-api.service=myhonda-api"
        - "traefik.http.routers.myhonda-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.myhonda-api.loadbalancer.passHostHeader=true"
        - "traefik.http.services.myhonda-api.loadbalancer.server.port=3000"

  # ─── Frontend React/Vite (nginx) ──────────────────────────────────────────────
  myhonda-sfs-front:
    image: ghcr.io/felipetmacedo/dashboard-myhonda:front-latest
    networks:
      - sagzap
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=sagzap"
        - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
        - "traefik.http.routers.myhonda-front.entrypoints=websecure"
        - "traefik.http.routers.myhonda-front.middlewares=sslheader"
        - "traefik.http.routers.myhonda-front.priority=1"
        - "traefik.http.routers.myhonda-front.rule=Host(`myhonda.sagzap.com.br`)"
        - "traefik.http.routers.myhonda-front.service=myhonda-front"
        - "traefik.http.routers.myhonda-front.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.myhonda-front.loadbalancer.passHostHeader=true"
        - "traefik.http.services.myhonda-front.loadbalancer.server.port=80"

networks:
  sagzap:
    external: true
    name: sagzap
