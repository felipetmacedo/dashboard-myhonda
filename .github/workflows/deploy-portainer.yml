name: Deploy Portainer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# GITHUB_TOKEN publica no pacote ligado ao repo: ghcr.io/<owner>/<repo>:<tag>
permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY_IMAGE }}:api-latest
            ${{ env.REGISTRY_IMAGE }}:api-${{ github.sha }}

  build-front:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Front image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY_IMAGE }}:front-latest
            ${{ env.REGISTRY_IMAGE }}:front-${{ github.sha }}

  deploy-stack:
    runs-on: ubuntu-latest
    needs: [build-api, build-front]
    steps:
      - name: Trigger Portainer webhook (stack completo)
        run: |
          curl --fail --show-error --silent --location --request POST \
            "${{ secrets.PORTAINER_WEBHOOK }}"
